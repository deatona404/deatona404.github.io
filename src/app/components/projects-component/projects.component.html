<section class="page-section projects">
  <div class="container">
    <div class="grid">
      <app-project-card
        *ngFor="let project of projectList; index as i"
        [title]="project.title"
        [description]="project.description"
        [href]="project.href"
        [buttonText]="project.buttonText"
        [note]="project.note"
        [imageSrc]="project.imageSrc"
        [variant]="project.variant"
        [reverse]="i % 2 === 1"
      ></app-project-card>
    </div>
  </div>
</section>
